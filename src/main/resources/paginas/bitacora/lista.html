<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="es">

<head th:replace="~{plantillas/plantilla :: head}"></head>
<body>
<header th:replace="~{plantillas/plantilla :: header}"></header>
<main class="container mt-4">
    <div class="p-4 rounded-3 shadow"
         style="background: linear-gradient(90deg, #212529, #343a40);">
        <h1 class="text-white mb-4">
            Bitácora del sistema
        </h1>
        <form th:action="@{/bitacora}" method="get" class="mb-4">
            <div class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label text-white">Fecha inicio</label>
                    <input type="date"
                           name="fechaInicio"
                           class="form-control"
                           th:value="${fechaInicio}">
                </div>
                <div class="col-md-4">
                    <label class="form-label text-white">Fecha fin</label>
                    <input type="date"
                           name="fechaFin"
                           class="form-control"
                           th:value="${fechaFin}">
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary">
                        Buscar
                    </button>
                    <a th:href="@{/bitacora}" class="btn btn-secondary">
                        Limpiar
                    </a>
                </div>
            </div>
        </form>
        <table class="table table-striped table-dark table-hover">
            <thead>
            <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Acción</th>
                <th>Tabla</th>
                <th>ID Registro</th>
                <th>Usuario</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="bitacora : ${bitacoras}">
                <td th:text="${bitacora.idBitacora}"></td>
                <td th:text="${bitacora.fechaHora}"></td>
                <td th:text="${bitacora.accion}"></td>
                <td th:text="${bitacora.tabla}"></td>
                <td th:text="${bitacora.idRegistro}"></td>
                <td th:text="${bitacora.usuario.nombreCompleto}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<footer th:replace="~{plantillas/plantilla::footer}"></footer>

</body>
</html>
