<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="es">
<head th:replace="~{plantillas/plantilla :: head}"></head>
<body>
<header th:replace="~{plantillas/plantilla :: header}"></header>
<main class="container mt-4">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div class="p-4 rounded-3 shadow"
         style="background: linear-gradient(90deg, #212529, #343a40);">
        <h1 class="text-white">Lista de Usuarios</h1>
        <a class="btn btn-primary mb-3"
           th:href="@{/usuarios/nuevo}">
            Nuevo usuario
        </a>
        <form th:action="@{/usuarios}"
              method="get"
              class="mb-3">
            <div class="row g-2">
                <div class="col-auto">
                    <input type="text"
                           name="buscar"
                           class="form-control"
                           placeholder="Buscar por nombre"
                           th:value="${buscar}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-light">
                        Buscar
                    </button>
                </div>
                <div class="col-auto">
                    <a th:href="@{/usuarios}"
                       class="btn btn-secondary">
                        Limpiar
                    </a>
                </div>
            </div>
        </form>
        <table class="table table-striped text-white">
            <thead>
            <tr>
                <th>ID</th>
                <th>Número empleado</th>
                <th>Nombre</th>
                <th>Dependencia</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.idUsuario}"></td>
                <td th:text="${u.numeroEmpleado}"></td>
                <td th:text="${u.nombreCompleto}"></td>
                <td th:text="${u.dependencia.nombre}"></td>
                <td>
                    <a class="btn btn-warning btn-sm"
                       th:href="@{/usuarios/{id}/editar(id=${u.idUsuario})}">
                        Editar
                    </a>
                    <a class="btn btn-danger btn-sm"
                       th:href="@{/usuarios/{id}/eliminar(id=${u.idUsuario})}"
                       onclick="return confirm('¿Desea eliminar este usuario?');">
                        Eliminar
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
        <div th:if="${page != null}">
            <div th:replace="~{plantillas/pag-nav :: paginador}"></div>
        </div>
    </div>
</main>
<footer th:replace="~{plantillas/plantilla::footer}"></footer>
</body>
</html>
