<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head th:replace="~{plantillas/plantilla :: head}"></head>
<body>
<header th:replace="~{plantillas/plantilla :: header}"></header>
<main class="container mt-4">
    <div class="p-4 rounded-3 shadow"
         style="background: linear-gradient(90deg, #212529, #343a40);">
        <h1 class="text-white">Lista de Reportes</h1>
        <a class="btn btn-primary mb-3"
           th:href="@{/reportes/nuevo}">
            Nuevo reporte
        </a>
        <a class="btn btn-danger mb-3"
           th:href="@{/reportes-pdf}">
            Generar PDF
        </a>
        <form th:action="@{/reportes}"
              method="get"
              class="mb-3">
            <div class="row g-2">
                <div class="col-auto">
                    <input type="text"
                           name="buscar"
                           class="form-control"
                           placeholder="Buscar por nombre"
                           th:value="${buscar}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-light">
                        Buscar
                    </button>
                </div>
                <div class="col-auto">
                    <a th:href="@{/reportes}"
                       class="btn btn-secondary">
                        Limpiar
                    </a>
                </div>
            </div>
        </form>
        <table class="table table-striped text-white">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Fecha creación</th>
                <th>Usuario</th>
                <th>Estatus</th>
                <th>Tipo</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="reporte : ${reportes}">
                <td th:text="${reporte.idReporte}"></td>
                <td th:text="${reporte.nombre}"></td>
                <td th:text="${reporte.descripcion}"></td>
                <td th:text="${reporte.fechaCreacion}"></td>
                <td th:text="${reporte.usuario.nombreCompleto}"></td>
                <td th:text="${reporte.estatusReporte.nombre}"></td>
                <td th:text="${reporte.tipoReporte.nombre}"></td>
                <td>
                    <a sec:authorize="hasAnyRole('ADMIN', 'USER')"
                       th:href="@{/reportes/{id}/editar(id=${reporte.idReporte})}"
                       class="btn btn-warning">
                        Editar
                    </a>

                    <a sec:authorize="hasAnyRole('ADMIN', 'USER')"
                       th:href="@{/reportes/{id}/eliminar(id=${reporte.idReporte})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Desea eliminar este reporte?');">
                        Eliminar
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
        <div th:if="${page != null}">
            <div th:replace="~{plantillas/pag-nav :: paginador}"></div>
        </div>
    </div>
</main>
<footer th:replace="~{plantillas/plantilla::footer}"></footer>
</body>
</html>
